name: MT5 Trading Session

# ─────────────────────────────────────────────────────────────────────────────
# Trigger manually: GitHub → Actions → "MT5 Trading Session" → Run workflow
#
# Required secrets:  NGROK_TOKEN
# Optional secrets:  MT5_USER   (default: "user")
#                    MT5_PASS   (default: "mt5pass")
#
# State is persisted via the /config bind-mount cached with actions/cache.
# A unique key per run (+ restore-keys prefix) ensures the cache always saves
# and the next run restores the most recent session's state.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: 'Session duration in minutes (max 110)'
        required: false
        default: '90'
        type: string
      runner_size:
        description: 'Runner size (larger = more CPU/RAM, costs more minutes)'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest          #  2 vCPU  7 GB  — free tier
          - ubuntu-latest-4-cores  #  4 vCPU 16 GB  — needs GitHub Team plan
          - ubuntu-latest-8-cores  #  8 vCPU 32 GB  — needs GitHub Team plan
          - ubuntu-latest-16-cores # 16 vCPU 64 GB  — needs GitHub Team plan

jobs:
  mt5-session:
    runs-on: ${{ github.event.inputs.runner_size || 'ubuntu-latest' }}
    timeout-minutes: 150

    permissions:
      contents: write   # needed to create/update GitHub Releases
      packages: read    # needed to pull from GHCR

    env:
      MT5_USER: ${{ secrets.MT5_USER || 'user' }}
      MT5_PASS: ${{ secrets.MT5_PASS || 'mt5pass' }}
      MT5_ROOT: './config/.wine/drive_c/Program Files/MetaTrader 5'

    steps:
      # ── 0. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mask credentials
        run: |
          echo "::add-mask::${{ env.MT5_USER }}"
          echo "::add-mask::${{ env.MT5_PASS }}"

      # ── 1a. Pull Docker image from GHCR ─────────────────────────────────────
      # The image contains a full Wine+MT5 install (~1 GB). We don't tar-cache
      # it because saving it to /tmp exhausts the runner's disk. GHCR pulls
      # are fast on GitHub-hosted runners (same network).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          # Alias as the base image name so the session container uses the
          # original base image entrypoint (no custom wrapper interference).
          docker tag ghcr.io/${{ github.repository }}:latest gmag11/metatrader5_vnc:latest

      # ── 1b. Mutable config cache (fast path) ────────────────────────────────
      # Unique key per run so the post-step always saves; restore-keys finds
      # the most recent entry. If the cache was evicted (>7 days), the next
      # step downloads the full tarball from the GitHub Release instead.
      - name: Restore MT5 config cache
        uses: actions/cache@v4
        with:
          path: ./config
          key: mt5-config-${{ runner.os }}-run-${{ github.run_id }}
          restore-keys: |
            mt5-config-${{ runner.os }}-run-

      # ── 1c. Fallback — restore from GitHub Release if cache is cold ──────────
      - name: Restore MT5 volume from GitHub Release (cache-miss fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "./config/.wine" ]; then
            echo "Cache hit — skipping release download"
          else
            echo "Cache miss — attempting to download saved volume from GitHub Release..."
            if gh release download mt5-state-latest \
                --pattern "mt5-config.tar.gz" \
                --dir /tmp \
                --repo "${{ github.repository }}" 2>/dev/null; then
              echo "Extracting volume tarball..."
              sudo tar xzf /tmp/mt5-config.tar.gz -C "$(pwd)"
              echo "Volume restored from GitHub Release ($(du -sh ./config | cut -f1))"
            else
              echo "No saved release found — starting fresh (first run)"
            fi
          fi

      # ── 2. Seed config if missing + fix ownership ───────────────────────────
      # The cache saves ./config owned by the runner user. The container runs
      # as uid 911 and must own all files in /config — otherwise the mt5linux
      # server can't write its state and fails to start MT5.
      # We fix ownership here (before the container starts) every run.
      - name: Seed MT5 config from pre-built image (if needed)
        run: |
          MT5_EXE="./config/.wine/drive_c/Program Files/MetaTrader 5/terminal64.exe"
          if [ ! -f "$MT5_EXE" ]; then
            echo "terminal64.exe not found — seeding from pre-built image..."
            docker run --rm \
              --entrypoint /bin/bash \
              -v "$(pwd)/config:/config" \
              ghcr.io/${{ github.repository }}:latest \
              -c "cp -a /config-base/. /config/ && chown -R 911:911 /config"
            echo "Seed complete ($(du -sh ./config | cut -f1))"
          else
            echo "Config already has MT5 — fixing ownership for container uid 911..."
            sudo chown -R 911:911 ./config
            echo "Done"
          fi

      # ── 3. Start MT5 container ───────────────────────────────────────────────
      # The /config bind-mount is critical: all persistent state (Wine prefix,
      # MT5 install, account data) lives on the host so it survives restarts.
      - name: Start MT5 container
        run: |
          TOTAL_MEM_MB=$(awk '/MemTotal/ {print int($2/1024)}' /proc/meminfo)
          CONTAINER_MEM_MB=$(( TOTAL_MEM_MB - 1024 ))
          echo "Runner: $(nproc) vCPU, ${TOTAL_MEM_MB} MB RAM → giving container $(nproc) vCPU, ${CONTAINER_MEM_MB} MB"

          docker run -d \
            --name mt5 \
            --cpus="$(nproc)" \
            --memory="${CONTAINER_MEM_MB}m" \
            -p 3000:3000 \
            -p 8001:8001 \
            -v "$(pwd)/config:/config" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e CUSTOM_USER="${MT5_USER}" \
            -e PASSWORD="${MT5_PASS}" \
            gmag11/metatrader5_vnc:latest
          echo "Container started"

      # ── 3. Wait for KasmVNC + MT5 to be ready ───────────────────────────────
      - name: Wait for MT5 to be ready
        run: |
          # Phase 1: KasmVNC web server
          echo "Phase 1: waiting for KasmVNC web server..."
          for _i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if echo "$STATUS" | grep -qE "^(200|301|302|401)$"; then
              echo "KasmVNC ready (HTTP $STATUS)"
              break
            fi
            echo "  attempt $_i/30 — HTTP $STATUS, waiting 10 s..."
            sleep 10
          done

          # Phase 2: terminal64.exe
          # With the pre-built image the seed copy takes seconds; allow up to 5 min.
          echo "Phase 2: waiting for terminal64.exe..."
          MT5_FOUND=0
          for _i in $(seq 1 30); do
            if docker top mt5 2>/dev/null | grep -qi "terminal64"; then
              echo "MT5 process is running (after $(( _i * 10 )) s)"
              MT5_FOUND=1
              break
            fi
            echo "  MT5 not yet running, waiting 10 s... ($_i/30)"
            sleep 10
          done
          if [ "$MT5_FOUND" = "0" ]; then
            echo "::warning::terminal64.exe not detected after 5 min — dumping container state"
            echo "=== docker top mt5 ==="
            docker top mt5 2>/dev/null || echo "(docker top failed)"
            echo "=== docker logs (first 60 lines — startup sequence) ==="
            docker logs mt5 2>&1 | head -60 || true
            echo "=== docker logs (last 40 lines) ==="
            docker logs --tail 40 mt5 2>&1 || true
            echo "=== /config contents ==="
            docker exec mt5 ls -la /config/ 2>/dev/null || true
            echo "=== terminal64.exe present? ==="
            docker exec mt5 ls -la "/config/.wine/drive_c/Program Files/MetaTrader 5/terminal64.exe" 2>/dev/null || echo "NOT FOUND"
          fi

          # Phase 3: window manager (confirms X desktop is up)
          echo "Phase 3: waiting for window manager..."
          for _i in $(seq 1 18); do
            if docker top mt5 2>/dev/null | grep -qiE "openbox|fluxbox|xfwm|jwm|i3|metacity"; then
              echo "Window manager running"
              break
            fi
            echo "  WM not yet running, waiting 5 s... ($_i/18)"
            sleep 5
          done

          echo "Phase 4: 30 s render buffer..."
          sleep 30
          echo "MT5 ready — connect via browser"

      # ── 4. Ngrok HTTP tunnel ─────────────────────────────────────────────────
      - name: Setup ngrok tunnel
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc > /dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list > /dev/null
          sudo apt-get update -qq && sudo apt-get install -y -qq ngrok

          ngrok config add-authtoken "$NGROK_TOKEN"
          nohup ngrok http 3000 > /tmp/ngrok.log 2>&1 &

          MT5_URL=""
          for _i in $(seq 1 13); do
            sleep 3
            MT5_URL=$(curl -s localhost:4040/api/tunnels \
              | python3 -c "
          import sys, json
          try:
              tunnels = json.load(sys.stdin).get('tunnels', [])
              for t in tunnels:
                  if t.get('proto') == 'https':
                      print(t['public_url'])
                      break
          except Exception:
              pass
          " 2>/dev/null)
            [ -n "$MT5_URL" ] && break
          done

          if [ -z "$MT5_URL" ]; then
            echo "::error::ngrok failed to start. Log:"
            cat /tmp/ngrok.log || true
            MT5_URL="FAILED — see log above"
          fi

          echo "::notice title=MT5 Ready — Open in browser::URL: $MT5_URL  |  User: $MT5_USER  |  Password: $MT5_PASS"
          echo ""
          echo "  ┌──────────────────────────────────────────────────────────┐"
          echo "  │  Open MT5 in your browser:                               │"
          echo "  │  URL:      $MT5_URL                                      │"
          echo "  │  User:     $MT5_USER                                     │"
          echo "  │  Password: $MT5_PASS                                     │"
          echo "  └──────────────────────────────────────────────────────────┘"
          echo ""
          echo "MT5_URL=$MT5_URL" >> "$GITHUB_ENV"

      # ── 5. Session window ────────────────────────────────────────────────────
      - name: Session active — ${{ github.event.inputs.session_minutes || '90' }} minutes
        run: |
          MINS="${{ github.event.inputs.session_minutes || '90' }}"
          echo "Session open for ${MINS} min. MT5 browser URL: $MT5_URL"
          echo "Cancel this workflow run to end early — state will still be saved."
          sleep $(( MINS * 60 ))

      # ── 6. Stop container ────────────────────────────────────────────────────
      # Stop first so MT5 flushes all data to ./config before we tar it.
      - name: Stop MT5 container
        if: always()
        run: docker stop mt5 2>/dev/null || true

      # Fix ownership so actions/cache and tar can read root-owned files written by the container.
      - name: Fix config directory permissions
        if: always()
        run: sudo chown -R "$USER:$USER" ./config || true

      # ── 7. Push volume to GitHub Release ────────────────────────────────────
      # Tars the entire ./config directory and uploads it to a rolling release
      # tag "mt5-state-latest". This survives cache eviction and is always the
      # source of truth for the full volume state.
      - name: Push MT5 volume to GitHub Release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -d "./config/.wine" ]; then
            echo "No config volume found — nothing to push"
            exit 0
          fi

          echo "Compressing ./config (this may take a few minutes)..."
          sudo rm -f /tmp/mt5-config.tar.gz
          sudo tar czf /tmp/mt5-config.tar.gz -C "$(pwd)" config
          SIZE=$(du -sh /tmp/mt5-config.tar.gz | cut -f1)
          echo "Tarball size: $SIZE"

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Delete old release and recreate (keeps only latest snapshot)
          gh release delete mt5-state-latest --yes \
            --repo "${{ github.repository }}" 2>/dev/null || true

          gh release create mt5-state-latest \
            --repo "${{ github.repository }}" \
            --title "MT5 Volume — ${TIMESTAMP}" \
            --notes "Full /config volume snapshot. Restored automatically on next workflow run." \
            --prerelease \
            /tmp/mt5-config.tar.gz

          echo "Volume pushed to GitHub Release mt5-state-latest (${SIZE})"

      # actions/cache post-step saves ./config automatically after all steps.
