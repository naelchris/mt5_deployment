name: MT5 Trading Session

# ─────────────────────────────────────────────────────────────────────────────
# Trigger manually: GitHub → Actions → "MT5 Trading Session" → Run workflow
#
# Required secrets:  NGROK_TOKEN
# Optional secrets:  MT5_USER   (default: "user")
#                    MT5_PASS   (default: "mt5pass")
#
# State is persisted by committing the running container to GHCR after each
# session. On the next run the pre-built image is pulled (fast) instead of
# doing a full Wine + MT5 install from scratch.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: 'Session duration in minutes (max 110)'
        required: false
        default: '90'
        type: string
      runner_size:
        description: 'Runner size (larger = more CPU/RAM, costs more minutes)'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest          #  2 vCPU  7 GB  — free tier
          - ubuntu-latest-4-cores  #  4 vCPU 16 GB  — needs GitHub Team plan
          - ubuntu-latest-8-cores  #  8 vCPU 32 GB  — needs GitHub Team plan
          - ubuntu-latest-16-cores # 16 vCPU 64 GB  — needs GitHub Team plan

jobs:
  mt5-session:
    runs-on: ${{ github.event.inputs.runner_size || 'ubuntu-latest' }}
    timeout-minutes: 120

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    env:
      MT5_USER: ${{ secrets.MT5_USER || 'user' }}
      MT5_PASS: ${{ secrets.MT5_PASS || 'mt5pass' }}
      # Saved image lives in GHCR under this repo's owner
      MT5_IMAGE: ghcr.io/${{ github.repository_owner }}/mt5-session:latest

    steps:
      # ── 0. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Login to GitHub Container Registry ────────────────────────────────
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ── 2. Pull saved image or fall back to upstream base ────────────────────
      # On first run (no saved image yet) we pull the upstream base image.
      # On subsequent runs we pull the committed image from GHCR — this
      # already has Wine + MT5 fully installed, so startup is much faster.
      - name: Pull MT5 image
        run: |
          if docker pull "$MT5_IMAGE" 2>/dev/null; then
            echo "Using saved image from GHCR: $MT5_IMAGE"
            echo "ACTIVE_IMAGE=$MT5_IMAGE" >> "$GITHUB_ENV"
          else
            BASE="gmag11/metatrader5_vnc:latest"
            echo "No saved image found — pulling base image: $BASE"
            docker pull "$BASE"
            echo "ACTIVE_IMAGE=$BASE" >> "$GITHUB_ENV"
          fi

      # ── 3. Start MT5 container ───────────────────────────────────────────────
      # Port 3000 → KasmVNC web UI  (browser access, no VNC client needed)
      # Port 8001 → mt5linux RPyC   (Python MetaTrader5 API)
      - name: Start MT5 container
        run: |
          TOTAL_MEM_MB=$(awk '/MemTotal/ {print int($2/1024)}' /proc/meminfo)
          CONTAINER_MEM_MB=$(( TOTAL_MEM_MB - 1024 ))
          echo "Runner: $(nproc) vCPU, ${TOTAL_MEM_MB} MB RAM → giving container $(nproc) vCPU, ${CONTAINER_MEM_MB} MB"

          docker run -d \
            --name mt5 \
            --cpus="$(nproc)" \
            --memory="${CONTAINER_MEM_MB}m" \
            -p 3000:3000 \
            -p 8001:8001 \
            -e CUSTOM_USER="${MT5_USER}" \
            -e PASSWORD="${MT5_PASS}" \
            "$ACTIVE_IMAGE"
          echo "Container started from $ACTIVE_IMAGE"

      # ── 4. Wait for KasmVNC + MT5 to be ready ───────────────────────────────
      - name: Wait for MT5 to be ready
        run: |
          # Phase 1: wait for KasmVNC web server (port 3000)
          echo "Phase 1: waiting for KasmVNC web server..."
          for _i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if echo "$STATUS" | grep -qE "^(200|301|302|401)$"; then
              echo "KasmVNC ready (HTTP $STATUS)"
              break
            fi
            echo "  attempt $_i/30 — HTTP $STATUS, waiting 10 s..."
            sleep 10
          done

          # Phase 2: wait for terminal64.exe (up to 10 min)
          echo "Phase 2: waiting for terminal64.exe..."
          MT5_FOUND=0
          for _i in $(seq 1 60); do
            if docker top mt5 2>/dev/null | grep -qi "terminal64"; then
              echo "MT5 process is running (after $(( _i * 10 )) s)"
              MT5_FOUND=1
              break
            fi
            echo "  MT5 not yet running, waiting 10 s... ($_i/60)"
            sleep 10
          done
          if [ "$MT5_FOUND" = "0" ]; then
            echo "::warning::terminal64.exe not detected after 10 min — dumping container state"
            echo "=== docker top mt5 ==="
            docker top mt5 2>/dev/null || echo "(docker top failed)"
            echo "=== docker logs (last 40 lines) ==="
            docker logs --tail 40 mt5 2>&1 || true
          fi

          # Phase 3: wait for window manager (confirms X desktop is up)
          echo "Phase 3: waiting for window manager..."
          for _i in $(seq 1 18); do
            if docker top mt5 2>/dev/null | grep -qiE "openbox|fluxbox|xfwm|jwm|i3|metacity"; then
              echo "Window manager running"
              break
            fi
            echo "  WM not yet running, waiting 5 s... ($_i/18)"
            sleep 5
          done

          echo "Phase 4: 30 s render buffer..."
          sleep 30
          echo "MT5 ready — connect via browser"

      # ── 5. Ngrok HTTP tunnel ─────────────────────────────────────────────────
      - name: Setup ngrok tunnel
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc > /dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list > /dev/null
          sudo apt-get update -qq && sudo apt-get install -y -qq ngrok

          ngrok config add-authtoken "$NGROK_TOKEN"
          nohup ngrok http 3000 > /tmp/ngrok.log 2>&1 &

          MT5_URL=""
          for _i in $(seq 1 13); do
            sleep 3
            MT5_URL=$(curl -s localhost:4040/api/tunnels \
              | python3 -c "
          import sys, json
          try:
              tunnels = json.load(sys.stdin).get('tunnels', [])
              for t in tunnels:
                  if t.get('proto') == 'https':
                      print(t['public_url'])
                      break
          except Exception:
              pass
          " 2>/dev/null)
            [ -n "$MT5_URL" ] && break
          done

          if [ -z "$MT5_URL" ]; then
            echo "::error::ngrok failed to start. Log:"
            cat /tmp/ngrok.log || true
            MT5_URL="FAILED — see log above"
          fi

          echo "::notice title=MT5 Ready — Open in browser::URL: $MT5_URL  |  User: $MT5_USER  |  Password: $MT5_PASS"
          echo ""
          echo "  ┌──────────────────────────────────────────────────────────┐"
          echo "  │  Open MT5 in your browser:                               │"
          echo "  │  URL:      $MT5_URL                                      │"
          echo "  │  User:     $MT5_USER                                     │"
          echo "  │  Password: $MT5_PASS                                     │"
          echo "  └──────────────────────────────────────────────────────────┘"
          echo ""
          echo "MT5_URL=$MT5_URL" >> "$GITHUB_ENV"

      # ── 6. Session window ────────────────────────────────────────────────────
      - name: Session active — ${{ github.event.inputs.session_minutes || '90' }} minutes
        run: |
          MINS="${{ github.event.inputs.session_minutes || '90' }}"
          echo "Session open for ${MINS} min. MT5 browser URL: $MT5_URL"
          echo "Cancel this workflow run to end early — state will still be exported."
          sleep $(( MINS * 60 ))

      # ── 7. Commit container → push to GHCR ──────────────────────────────────
      # Runs even on cancellation so the session state is never lost.
      # docker commit snapshots the live container filesystem (Wine prefix,
      # MT5 install, EA files, broker config, everything) into a new image layer.
      - name: Export container to GHCR
        if: always()
        run: |
          echo "Committing container state..."
          docker commit mt5 "$MT5_IMAGE"
          echo "Pushing $MT5_IMAGE to GHCR..."
          docker push "$MT5_IMAGE"
          echo "Done — next run will start from this image"

      # ── 8. Stop container ────────────────────────────────────────────────────
      - name: Stop MT5 container
        if: always()
        run: docker stop mt5 2>/dev/null || true
