name: MT5 Trading Session

# ─────────────────────────────────────────────────────────────────────────────
# Trigger manually: GitHub → Actions → "MT5 Trading Session" → Run workflow
#
# Required secrets:  NGROK_TOKEN
# Optional secrets:  MT5_USER   (default: "user")
#                    MT5_PASS   (default: "mt5pass")
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: 'Session duration in minutes (max 110)'
        required: false
        default: '90'
        type: string
      runner_size:
        description: 'Runner size (larger = more CPU/RAM, costs more minutes)'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest          #  2 vCPU  7 GB  — free tier
          - ubuntu-latest-4-cores  #  4 vCPU 16 GB  — needs GitHub Team plan
          - ubuntu-latest-8-cores  #  8 vCPU 32 GB  — needs GitHub Team plan
          - ubuntu-latest-16-cores # 16 vCPU 64 GB  — needs GitHub Team plan

jobs:
  mt5-session:
    runs-on: ${{ github.event.inputs.runner_size || 'ubuntu-latest' }}
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      MT5_USER: ${{ secrets.MT5_USER || 'user' }}
      MT5_PASS: ${{ secrets.MT5_PASS || 'mt5pass' }}
      # Root of the MT5 install inside the cached Wine volume
      MT5_ROOT: './config/.wine/drive_c/Program Files/MetaTrader 5'

    steps:
      # ── 0. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1a. Cache the Docker image (~4 GB) ───────────────────────────────────
      # Saves a docker save tarball so subsequent runs skip the Docker Hub pull.
      # Bump the key suffix to force a fresh pull of a newer image version.
      - name: Restore Docker image cache
        id: cache-image
        uses: actions/cache@v4
        with:
          path: /tmp/mt5-image.tar
          key: mt5-docker-image-v1

      - name: Load or pull Docker image
        run: |
          if [ -f /tmp/mt5-image.tar ]; then
            echo "Loading image from cache..."
            docker load < /tmp/mt5-image.tar
          else
            echo "Pulling image from Docker Hub..."
            docker pull gmag11/metatrader5_vnc:latest
            echo "Saving image to cache..."
            docker save gmag11/metatrader5_vnc:latest > /tmp/mt5-image.tar
          fi

      # ── 1b. Cache the Docker /config volume ──────────────────────────────────
      # The /config volume holds the Wine prefix + MT5 installation (~1-2 GB).
      # On warm runs the container skips the full install and starts in seconds.
      # Bump the key suffix (v1 → v2 …) to force a clean install.
      - name: Restore MT5 config cache
        id: cache-config
        uses: actions/cache@v4
        with:
          path: ./config
          key: mt5-docker-config-${{ runner.os }}-v1

      # ── 2. Inject saved MT5 state from repo into the config volume ───────────
      # Restores MQL5 source files, EA data files, profiles AND terminal config.
      - name: Restore MT5 state from repo
        run: |
          MT5="${{ env.MT5_ROOT }}"

          # MQL5 source directories
          for dir in Experts Indicators Scripts Libraries; do
            src="${GITHUB_WORKSPACE}/MQL5/$dir"
            dst="$MT5/MQL5/$dir"
            if [ -d "$src" ]; then
              mkdir -p "$dst"
              rsync -a --delete "$src/" "$dst/"
              echo "Restored MQL5/$dir"
            fi
          done

          # EA runtime data files
          if [ -d "${GITHUB_WORKSPACE}/MQL5/Files" ]; then
            mkdir -p "$MT5/MQL5/Files"
            rsync -a --delete "${GITHUB_WORKSPACE}/MQL5/Files/" "$MT5/MQL5/Files/"
            echo "Restored MQL5/Files"
          fi

          # Chart profiles / layouts
          if [ -d "${GITHUB_WORKSPACE}/Profiles" ]; then
            mkdir -p "$MT5/Profiles"
            rsync -a --delete "${GITHUB_WORKSPACE}/Profiles/" "$MT5/Profiles/"
            echo "Restored Profiles"
          fi

          # Terminal config (broker servers, templates, terminal.ini)
          if [ -d "${GITHUB_WORKSPACE}/MT5Config" ]; then
            mkdir -p "$MT5/config"
            rsync -a --delete "${GITHUB_WORKSPACE}/MT5Config/" "$MT5/config/"
            echo "Restored MT5Config"
          fi

      # ── 3. Start MT5 Docker container ────────────────────────────────────────
      # Port 3000 → KasmVNC web UI  (browser access, no VNC client needed)
      # Port 8001 → mt5linux RPyC   (Python MetaTrader5 API)
      - name: Start MT5 container
        run: |
          # Give the container all CPUs and leave ~1 GB for the runner OS
          TOTAL_MEM_MB=$(awk '/MemTotal/ {print int($2/1024)}' /proc/meminfo)
          CONTAINER_MEM_MB=$(( TOTAL_MEM_MB - 1024 ))
          echo "Runner: $(nproc) vCPU, ${TOTAL_MEM_MB} MB RAM → giving container $(nproc) vCPU, ${CONTAINER_MEM_MB} MB"

          docker run -d \
            --name mt5 \
            --cpus="$(nproc)" \
            --memory="${CONTAINER_MEM_MB}m" \
            -p 3000:3000 \
            -p 8001:8001 \
            -v "$(pwd)/config:/config" \
            -e CUSTOM_USER="${MT5_USER}" \
            -e PASSWORD="${MT5_PASS}" \
            gmag11/metatrader5_vnc:latest
          echo "Container started"

      # ── 4. Wait for KasmVNC + MT5 process to be ready ───────────────────────
      - name: Wait for MT5 to be ready
        run: |
          # Phase 1: wait for KasmVNC web server (port 3000)
          echo "Phase 1: waiting for KasmVNC web server..."
          for _i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if echo "$STATUS" | grep -qE "^(200|301|302|401)$"; then
              echo "KasmVNC ready (HTTP $STATUS)"
              break
            fi
            echo "  attempt $_i/30 — HTTP $STATUS, waiting 10 s..."
            sleep 10
          done

          # Phase 2: wait for terminal64.exe to appear in the container process list
          # Uses docker top (host-side) — avoids needing pgrep inside the container
          echo "Phase 2: waiting for MT5 (terminal64.exe) to launch..."
          for _i in $(seq 1 24); do
            if docker top mt5 2>/dev/null | grep -qi "terminal64"; then
              echo "MT5 process is running"
              break
            fi
            echo "  MT5 not yet running, waiting 10 s... ($_i/24)"
            sleep 10
          done

          # Phase 3: give MT5 extra time to finish rendering its UI
          echo "Phase 3: waiting 20 s for MT5 UI to finish rendering..."
          sleep 20
          echo "MT5 ready — connect via browser"

      # ── 5. Ngrok HTTP tunnel ─────────────────────────────────────────────────
      # HTTP tunnel on port 3000 — works on ngrok free plan.
      # KasmVNC serves a full browser-based MT5 desktop at this URL.
      - name: Setup ngrok tunnel
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc > /dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list > /dev/null
          sudo apt-get update -qq && sudo apt-get install -y -qq ngrok

          ngrok config add-authtoken "$NGROK_TOKEN"
          nohup ngrok http 3000 > /tmp/ngrok.log 2>&1 &

          # Poll until HTTPS URL is available (up to ~40 s)
          MT5_URL=""
          for _i in $(seq 1 13); do
            sleep 3
            MT5_URL=$(curl -s localhost:4040/api/tunnels \
              | python3 -c "
          import sys, json
          try:
              tunnels = json.load(sys.stdin).get('tunnels', [])
              for t in tunnels:
                  if t.get('proto') == 'https':
                      print(t['public_url'])
                      break
          except Exception:
              pass
          " 2>/dev/null)
            [ -n "$MT5_URL" ] && break
          done

          if [ -z "$MT5_URL" ]; then
            echo "::error::ngrok failed to start. Log:"
            cat /tmp/ngrok.log || true
            MT5_URL="FAILED — see log above"
          fi

          echo "::notice title=MT5 Ready — Open in browser::URL: $MT5_URL  |  User: $MT5_USER  |  Password: $MT5_PASS"
          echo ""
          echo "  ┌──────────────────────────────────────────────────────────┐"
          echo "  │  Open MT5 in your browser:                               │"
          echo "  │  URL:      $MT5_URL                                      │"
          echo "  │  User:     $MT5_USER                                     │"
          echo "  │  Password: $MT5_PASS                                     │"
          echo "  └──────────────────────────────────────────────────────────┘"
          echo ""
          echo "MT5_URL=$MT5_URL" >> "$GITHUB_ENV"

      # ── 6. Session window ────────────────────────────────────────────────────
      # Runner stays alive for the configured duration.
      # Cancel this workflow run from the GitHub Actions UI to end early.
      # The export step below runs regardless (if: always()).
      - name: Session active — ${{ github.event.inputs.session_minutes || '90' }} minutes
        run: |
          MINS="${{ github.event.inputs.session_minutes || '90' }}"
          echo "Session open for ${MINS} min. MT5 browser URL: $MT5_URL"
          echo "Cancel this workflow run to end early — state will still be exported."
          sleep $(( MINS * 60 ))

      # ── 7. Export MT5 state back to GitHub ───────────────────────────────────
      # Runs even on cancellation (if: always()).
      # Pulls latest main first to avoid conflicts, then pushes directly.
      - name: Export MT5 state to GitHub
        if: always()
        run: |
          MT5="${{ env.MT5_ROOT }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get back onto main and pull latest before we write anything
          git checkout main
          git pull origin main --ff-only

          cd "${GITHUB_WORKSPACE}"

          # ── MQL5 source files ───────────────────────────────────────────────
          for dir in Experts Indicators Scripts Libraries; do
            src="$MT5/MQL5/$dir"
            dst="${GITHUB_WORKSPACE}/MQL5/$dir"
            if [ -d "$src" ]; then
              mkdir -p "$dst"
              # No pipe — piping to head sends SIGPIPE which kills rsync early
              rsync -a --delete "$src/" "$dst/"
              echo "Synced MQL5/$dir ($(find "$dst" -type f | wc -l) files)"
            else
              echo "Skipped MQL5/$dir — not found in container"
            fi
          done

          # EA runtime data files
          if [ -d "$MT5/MQL5/Files" ]; then
            mkdir -p "${GITHUB_WORKSPACE}/MQL5/Files"
            rsync -a --delete "$MT5/MQL5/Files/" "${GITHUB_WORKSPACE}/MQL5/Files/"
            echo "Synced MQL5/Files"
          fi

          # Chart profiles / layouts
          if [ -d "$MT5/Profiles" ]; then
            mkdir -p "${GITHUB_WORKSPACE}/Profiles"
            rsync -a --delete "$MT5/Profiles/" "${GITHUB_WORKSPACE}/Profiles/"
            echo "Synced Profiles"
          fi

          # Terminal config: broker servers, templates, terminal.ini
          # .dat files hold encrypted account credentials — safe to commit
          # Debug: show what dirs actually exist under the MT5 root
          echo "=== MT5 root dirs ==="
          ls -1 "$MT5/" 2>/dev/null || echo "MT5 root missing: $MT5"

          for cfg_dir in config Config cfg; do
            if [ -d "$MT5/$cfg_dir" ]; then
              mkdir -p "${GITHUB_WORKSPACE}/MT5Config"
              rsync -a --delete \
                --exclude='*.log' \
                "$MT5/$cfg_dir/" "${GITHUB_WORKSPACE}/MT5Config/"
              echo "Synced MT5Config from $cfg_dir/ ($(ls "${GITHUB_WORKSPACE}/MT5Config/" | wc -l) files)"
              break
            fi
          done

          # Stage only directories that actually exist — avoids git exit 128
          # on missing paths which would abort the whole export
          for d in MQL5 Profiles MT5Config; do
            [ -d "${GITHUB_WORKSPACE}/$d" ] && git add "$d/"
          done

          echo "=== git status ==="
          git status --short

          if git diff --staged --quiet; then
            echo "No changes — nothing to export"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: export MT5 state — ${TIMESTAMP}"
            git push origin main
            echo "State exported to main"
          fi

      # ── 8. Stop container ────────────────────────────────────────────────────
      - name: Stop MT5 container
        if: always()
        run: docker stop mt5 2>/dev/null || true
